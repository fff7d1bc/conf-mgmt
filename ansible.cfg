[defaults]
interpreter_python = auto_silent
retry_files_enabled = False
result_format = yaml
no_target_syslog = True
force_handlers = True

[colors]
error = bright red

[ssh_connection]
pipelining = True
control_path = /tmp/ansible-ssh-%%h-%%p-%%r
ssh_args = -o ControlMaster=auto -o ControlPersist=120
