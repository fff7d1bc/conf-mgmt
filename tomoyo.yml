#!/usr/bin/env ansible-playbook

- name: tomoyo
  gather_facts: true
  gather_subset:
    - min
  hosts: [all]
  vars:
    confmgmt:
      rpm_ostree:
        packages:
          - zsh
          - syncthing
          - htop
          - jetbrains-mono-fonts-all
          - vim
          - tailscale
          - lm_sensors
          - docker-cli
          - virt-manager
          - btop
          - tmux
          - steam
          - steam-devices
          - gcc
          - gcc-c++
          - make
          - glibc-devel
          - glibc-static
          - pkgconf-pkg-config
          - kernel-headers
          - golang
        kargs:
          - amdgpu.abmlevel=0
      flatpak:
        packages:
          - io.github.ilya_zlobintsev.LACT
          - it.mijorus.gearlever
      homebrew:
        user: piotr
        formulas:
          - ffmpeg-full
          - svt-av1
          - borgbackup
          - mkvtoolnix
          - rust
          - rclone
          - yt-dlp
          - mpv
          - ripgrep
          - fzy
          - codex
      sshd: 
      plasmalogin:
      home_files:
        files:
          root:
            - bash
            - zsh
            - tmux
            - git
          piotr:
            - bash
            - zsh
            - mpv
            - wezterm
            - tmux
            - git
  roles:
    - role: meta
