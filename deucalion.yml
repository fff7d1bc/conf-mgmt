#!/usr/bin/env ansible-playbook

- name: deucalion
  gather_facts: true
  gather_subset:
    - min
  hosts: [all]
  vars:
    confmgmt:
      rpm_ostree:
        packages:
          - zsh
          - syncthing
          - htop
          - jetbrains-mono-fonts-all
          - firejail
        kargs:
          - amdgpu.abmlevel=0
        system_groups:
          - docker
      flatpak:
        packages:
          - org.wezfurlong.wezterm
          - io.github.ilya_zlobintsev.LACT
      homebrew:
        user: piotr
        formulas:
          - ffmpeg
          - svt-av1
          - borgbackup
          - mkvtoolnix
          - rust
          - rclone
          - yt-dlp
          - mpv
      sshd: 
      sddm:
      home_files:
        overrides:
          wezterm:
            font_size: 12
        files:
          root:
            - zsh
            - tmux
            - git
          piotr:
            - zsh
            - mpv
            - wezterm
            - tmux
            - git
  roles:
    - role: meta
