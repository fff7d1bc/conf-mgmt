- name: rpm-ostree
  tags: [rpm_ostree]
  block:
  - name: rpm-ostree metadata refresh
    shell: rpm-ostree refresh-md
    register: rpm_ostree_metadata_refresh_results
    changed_when: rpm_ostree_metadata_refresh_results.stdout_lines | select('search', '^Updating metadata for') | list | length > 0

  - name: rpm-ostree upgrade
    shell: rpm-ostree upgrade
    register: rpm_ostree_upgrade_results
    changed_when: rpm_ostree_upgrade_results.stdout_lines | select('search', '^Staging deployment') | list | length > 0

  - name: rpm-ostree packages
    when: confmgmt.rpm_ostree.packages is defined
    community.general.rpm_ostree_pkg:
      name: "{{ confmgmt.rpm_ostree.packages }}"
      apply_live: False
      state: present

  - name: rpm-ostree kargs
    when: confmgmt.rpm_ostree.packages is defined and (('=' in item) and ((ansible_facts.proc_cmdline[(item | split('=', 1))[0]] | default(None)) != (item | split('=', 1))[1])) or (('=' not in item) and ((ansible_facts.proc_cmdline[item] | default(false)) != true))
    shell: rpm-ostree kargs --append-if-missing {{ item | quote }}
    with_items: "{{ confmgmt.rpm_ostree.kargs }}"

  - name: Read mutable group database
    when: confmgmt.rpm_ostree.system_groups is defined
    slurp:
      path: /etc/group
    register: rpm_ostree_etc_group

  - name: Read immutable group database
    when: confmgmt.rpm_ostree.system_groups is defined
    slurp:
      path: /usr/lib/group
    register: rpm_ostree_usr_group

  - name: Parse group databases
    when: confmgmt.rpm_ostree.system_groups is defined
    set_fact:
      rpm_ostree_etc_group_lines: "{{ (rpm_ostree_etc_group.content | b64decode).splitlines() }}"
      rpm_ostree_usr_group_lines: "{{ (rpm_ostree_usr_group.content | b64decode).splitlines() }}"

  - name: Read selected groups from NSS
    when: confmgmt.rpm_ostree.system_groups is defined
    command:
      argv:
        - getent
        - group
        - "{{ item }}"
    changed_when: false
    failed_when: false
    register: rpm_ostree_getent_groups
    loop: "{{ confmgmt.rpm_ostree.system_groups | unique }}"

  - name: Validate selected rpm-ostree system groups
    when: confmgmt.rpm_ostree.system_groups is defined
    vars:
      rpm_ostree_group_re: "^{{ item | regex_escape }}:"
      rpm_ostree_etc_group_matches: "{{ rpm_ostree_etc_group_lines | select('match', rpm_ostree_group_re) | list }}"
      rpm_ostree_usr_group_matches: "{{ rpm_ostree_usr_group_lines | select('match', rpm_ostree_group_re) | list }}"
      rpm_ostree_getent_group_matches: "{{ (rpm_ostree_getent_groups.results | selectattr('item', 'equalto', item) | map(attribute='stdout_lines') | first | default([])) | select('match', rpm_ostree_group_re) | list }}"
      rpm_ostree_group_source_matches: "{{ (rpm_ostree_usr_group_matches | length > 0) | ternary(rpm_ostree_usr_group_matches, rpm_ostree_getent_group_matches) }}"
    assert:
      that:
        - rpm_ostree_etc_group_matches | length <= 1
        - rpm_ostree_etc_group_matches | length == 1 or rpm_ostree_group_source_matches | length == 1
      fail_msg: "Expected group {{ item }} to be present at most once in /etc/group, or absent from /etc/group and present exactly once in /usr/lib/group or getent group {{ item }}."
    loop: "{{ confmgmt.rpm_ostree.system_groups | unique }}"

  - name: Cast selected groups from immutable /usr/lib/group to mutable /etc/group
    when:
      - confmgmt.rpm_ostree.system_groups is defined
      - rpm_ostree_etc_group_lines | select('match', rpm_ostree_group_re) | list | length == 0
    vars:
      rpm_ostree_group_re: "^{{ item | regex_escape }}:"
      rpm_ostree_usr_group_matches: "{{ rpm_ostree_usr_group_lines | select('match', rpm_ostree_group_re) | list }}"
      rpm_ostree_getent_group_matches: "{{ (rpm_ostree_getent_groups.results | selectattr('item', 'equalto', item) | map(attribute='stdout_lines') | first | default([])) | select('match', rpm_ostree_group_re) | list }}"
      rpm_ostree_group_source_matches: "{{ (rpm_ostree_usr_group_matches | length > 0) | ternary(rpm_ostree_usr_group_matches, rpm_ostree_getent_group_matches) }}"
    lineinfile:
      path: /etc/group
      line: "{{ rpm_ostree_group_source_matches | first }}"
      insertafter: EOF
      state: present
      backup: true
    loop: "{{ confmgmt.rpm_ostree.system_groups | unique }}"
