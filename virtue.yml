#!/usr/bin/env ansible-playbook

- name: virtue
  gather_facts: true
  gather_subset:
    - min
  hosts: [all]
  vars:
    confmgmt:
      homebrew:
        user: deck
        formulas:
          - fzy
          - ffmpeg-full
          - borgbackup
          - mkvtoolnix
          - rust
          - rclone
          - yt-dlp
          - mpv
          - asdf
          - make
          - gcc
          - golang
      sshd:
      home_files:
        files:
          root:
            - bash
            - zsh
            - tmux
            - git
          deck:
            - bash
            - zsh
            - mpv
            - wezterm
            - tmux
            - git
  roles:
    - role: meta
